name: changelog

on:
  workflow_dispatch:
  pull_request:
    paths:
      - CHANGELOG.md
      - .github/workflows/changelog.yml

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate Keep a Changelog structure
        run: |
          grep -q '^## \[Unreleased\]' CHANGELOG.md
