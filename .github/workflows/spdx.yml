name: spdx

on:
  pull_request:

jobs:
  spdx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify SPDX/AGPL project metadata
        run: |
          test -f REUSE.toml
          test -f LICENSES/AGPL-3.0-or-later.txt
          php -r '$j=json_decode(file_get_contents("composer.json"), true); if (($j["license"] ?? "") !== "AGPL-3.0-or-later") {fwrite(STDERR, "Invalid license metadata\n"); exit(1);} '
