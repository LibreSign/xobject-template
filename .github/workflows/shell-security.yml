name: shell-security

on:
  pull_request:

jobs:
  shell-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shell tools
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt devscripts
      - name: shellcheck
        run: shellcheck scripts/*.sh
      - name: shfmt check
        run: shfmt -d scripts
      - name: checkbashisms
        run: checkbashisms -f scripts/*.sh
