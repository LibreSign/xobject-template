name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
template: |
  ## Changes

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
change-template: '- $TITLE (#$NUMBER)'
categories:
  - title: 'Features'
    labels:
      - feature
      - enhancement
  - title: 'Fixes'
    labels:
      - bug
  - title: 'Maintenance'
    labels:
      - chore
change-title-escapes: '\\<*_&'
